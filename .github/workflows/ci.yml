name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and interaction tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_SITE_URL: https://noisgit.github.io/NativasApp/
          VITE_APPLICATION_FORM_ENDPOINT: ${{ vars.VITE_APPLICATION_FORM_ENDPOINT }}
          VITE_FORM_PROVIDER: formspree
